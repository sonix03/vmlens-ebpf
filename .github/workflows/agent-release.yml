name: Agent release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-tools-common
          sudo apt-get install -y "linux-tools-$(uname -r)" || true
          if ! command -v bpftool >/dev/null 2>&1; then
            BPFTOOL_PATH="$(find /usr/lib/linux-tools* -name bpftool -type f 2>/dev/null | head -n1 || true)"
            if [ -n "$BPFTOOL_PATH" ]; then
              sudo ln -sf "$BPFTOOL_PATH" /usr/local/bin/bpftool
            fi
          fi
          command -v bpftool
          test -r /sys/kernel/btf/vmlinux

      - name: Build precompiled agent artifacts
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}" TARGET_ARCHES="amd64" bash scripts/build-agent-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmlens-agent-artifacts
          path: dist/agent/**

      - name: Upload GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agent/${{ github.ref_name }}/vmlens-agent-linux-amd64
            dist/agent/${{ github.ref_name }}/flow_tracker-linux-amd64.bpf.o
            dist/agent/${{ github.ref_name }}/install-agent.sh
            dist/agent/${{ github.ref_name }}/SHA256SUMS
