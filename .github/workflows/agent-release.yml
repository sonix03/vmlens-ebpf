name: Agent release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 libbpf-dev linux-tools-common
          sudo apt-get install -y "linux-tools-$(uname -r)" "linux-cloud-tools-$(uname -r)" || true
          sudo apt-get install -y linux-tools-azure linux-cloud-tools-azure || true
          BPFTOOL_PATH="$(find /usr/lib -path '*linux*tools*' -name bpftool -type f -executable 2>/dev/null | sort -Vr | head -n1 || true)"
          if [ -n "$BPFTOOL_PATH" ]; then
            sudo ln -sf "$BPFTOOL_PATH" /usr/local/bin/bpftool
          fi
          hash -r
          command -v bpftool || true
          if command -v bpftool >/dev/null 2>&1 && ! bpftool version; then
            find /usr/lib -path '*linux*tools*' -name bpftool -type f -executable 2>/dev/null || true
          fi
          test -r /sys/kernel/btf/vmlinux || true

      - name: Build precompiled agent artifacts
        run: |
          set -euxo pipefail
          go version
          go env GOVERSION GOPATH GOMODCACHE
          command -v clang-18
          clang-18 --version
          clang-18 -print-targets | grep -E '^[[:space:]]*bpf[[:space:]]' || true
          command -v bpftool || true
          bpftool version || true
          ls -l /usr/include/bpf/bpf_helpers.h agent/ebpf/include/vmlinux_fallback.h
          ls -l /sys/kernel/btf/vmlinux || true
          VERSION="${GITHUB_REF_NAME:-dev}" TARGET_ARCHES="amd64" CLANG_BIN=clang-18 bash -x scripts/build-agent-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vmlens-agent-artifacts
          path: dist/agent/**

      - name: Upload GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agent/${{ github.ref_name }}/vmlens-agent-linux-amd64
            dist/agent/${{ github.ref_name }}/flow_tracker-linux-amd64.bpf.o
            dist/agent/${{ github.ref_name }}/install-agent.sh
            dist/agent/${{ github.ref_name }}/SHA256SUMS
